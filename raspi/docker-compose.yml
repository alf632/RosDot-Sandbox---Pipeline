version: '3.9'

services:
  realsense_streamer:
    build: .
    container_name: realsense_cam1
    network_mode: "host"       # Crucial: allows ROS 2 DDS to discover the central server on the local network
    privileged: true           # Grants the container access to all USB devices
    volumes:
      - /dev/bus/usb:/dev/bus/usb # Maps the USB bus into the container
    environment:
      - ROS_DOMAIN_ID=42       # MUST match the ROS_DOMAIN_ID on your central server
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    command: >
      bash -c "source /opt/ros/humble/setup.bash && \
      ros2 run realsense2_camera realsense2_camera_node \
      --ros-args \
      -r __node:=cam1 \
      -r __ns:=/camera \
      -p camera_name:=cam1 \
      -p enable_color:=false \
      -p enable_infra1:=false \
      -p enable_infra2:=false \
      -p pointcloud.enable:=false \
      -p enable_depth:=true \
      -p depth_module.profile:=848x480x30 \
      -p depth_module.emitter_enabled:=1"
